name: Test trusted

on:
  workflow_call:
    inputs:
      runs-on:
        required: true
        type: string
      python-version:
        required: true
        type: string
      python-env:
        required: true
        type: string
      hatch-run:
        required: true
        type: string
      should-run:
        # Posts the required check as success but skips the heavy steps when
        # the PR only touches paths that don't affect tests. Kept at the step
        # level so the matrix in the calling workflow still expands and each
        # per-cell required check name is reported.
        required: false
        type: string
        default: "true"

permissions:
  contents: none
  issues: write

jobs:
  tests-trusted:
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - if: inputs.should-run == 'true'
        name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
      - if: inputs.should-run == 'true'
        name: Install dependencies
        run: |
          python -m pip install --upgrade pip click==8.2.1 hatch==1.15.1 virtualenv==20.39.1
          python -m hatch env create ${{ inputs.python-env }}
      - if: inputs.should-run == 'true'
        name: Run integration tests
        env:
          GH_TOKEN: ${{ secrets.SNOWFLAKE_GITHUB_TOKEN }}
          TERM: unknown
          SNOWFLAKE_CONNECTIONS_INTEGRATION_AUTHENTICATOR: SNOWFLAKE_JWT
          SNOWFLAKE_CONNECTIONS_INTEGRATION_HOST: ${{ secrets.SNOWFLAKE_HOST }}
          SNOWFLAKE_CONNECTIONS_INTEGRATION_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_CONNECTIONS_INTEGRATION_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_CONNECTIONS_INTEGRATION_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_CONNECTIONS_INTEGRATION_PRIVATE_KEY_RAW: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_RAW }}
        run: python -m hatch run ${{ inputs.hatch-run }}

