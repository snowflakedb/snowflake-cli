name: Release notes check

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - labeled
      - unlabeled

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changelog:
    name: Check RELEASE-NOTES.md is updated
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Check for skip label
        id: skip_check
        run: |
          if echo '${{ toJson(github.event.pull_request.labels.*.name) }}' | grep -q 'skip-release-notes'; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - name: Check RELEASE-NOTES.md was modified
        if: steps.skip_check.outputs.skip == 'false'
        run: |
          if ! git diff --name-only --diff-filter=ACMRT ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | grep -wq RELEASE-NOTES.md; then
            echo "RELEASE-NOTES.md was not modified. Please update it or add the 'skip-release-notes' label to skip this check."
            exit 1
          fi
