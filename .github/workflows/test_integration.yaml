name: Integration testing

on:
  pull_request:
    branches:
      - "**"
  push:
    tags:
      - "v*" # Push events to matching v*, i.e. v1.0, v20.15.10
    branches:
      - main
      - features/*
  repository_dispatch:
    types: [ok-to-test-command]
  schedule:
    - cron: "0 8 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  define-matrix:
    uses: ./.github/workflows/matrix.yaml
  changes:
    uses: ./.github/workflows/changes.yaml

  # Branch-based pull request.
  # Required check `integration-trusted (<os>, <py>) / tests-trusted` must
  # report on every same-repo PR. The job-level `if:` only filters out fork
  # events (the secret-handling trust gate); the docs-only short-circuit is
  # pushed down via `should-run` so the matrix still expands when
  # changes.code == 'false' and each per-cell required check is posted.
  integration-trusted:
    needs: [define-matrix, changes]
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(needs.define-matrix.outputs.os) }}
        python-version: ${{ fromJSON(needs.define-matrix.outputs.python) }}
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    uses: ./.github/workflows/test_trusted.yaml
    with:
      runs-on: ${{ matrix.os }}
      python-version: ${{ matrix.python-version }}
      python-env: integration
      hatch-run: integration:test
      should-run: ${{ needs.changes.outputs.code == 'true' || github.event_name != 'pull_request' }}
    secrets: inherit

  # Non-blocking informational job: run UD tests on trusted PRs
  ud-integration:
    name: UD Integration (ubuntu-latest, py3.12)
    runs-on: ubuntu-latest
    continue-on-error: true
    if: |
      github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Display Python version
        run: python -c "import sys; print(sys.version)"

      - name: Install required tools
        run: |
          python -m pip install -U pip
          pip install click==8.2.1 hatch==1.15.1 virtualenv==20.39.1
          hatch --version

      - name: Patch dependencies for universal driver
        run: python scripts/patch_universal_driver.py

      - name: Install and test UD
        run: |
          hatch config set dirs.env.virtual .hatch
          hatch run ud:check
        env:
          GH_TOKEN: ${{ secrets.SNOWFLAKE_GITHUB_TOKEN }}
          PYTHON_VERSION: "3.12"
          TERM: unknown
          PYTEST_ADDOPTS: --color=yes --tb=short -v
          UD_BRANCH: main
          SNOWFLAKE_CONNECTIONS_INTEGRATION_AUTHENTICATOR: SNOWFLAKE_JWT
          SNOWFLAKE_CONNECTIONS_INTEGRATION_HOST: ${{ secrets.SNOWFLAKE_HOST }}
          SNOWFLAKE_CONNECTIONS_INTEGRATION_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_CONNECTIONS_INTEGRATION_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_CONNECTIONS_INTEGRATION_DATABASE: ${{ secrets.SNOWFLAKE_DATABASE }}
          SNOWFLAKE_CONNECTIONS_INTEGRATION_PRIVATE_KEY_RAW: ${{ secrets.SNOWFLAKE_PRIVATE_KEY_RAW }}
        shell: bash

  # Repo owner has commented /ok-to-test on a (fork-based) pull request
  integration-fork:
    needs: define-matrix
    strategy:
      fail-fast: true
      matrix:
        os: ${{ fromJSON(needs.define-matrix.outputs.os) }}
        python-version: ${{ fromJSON(needs.define-matrix.outputs.python) }}
    permissions:
      contents: read
      pull-requests: read
      checks: write
    if: |
      github.event_name == 'repository_dispatch' &&
      github.event.client_payload.slash_command.args.named.sha != '' &&
      contains(
        github.event.client_payload.pull_request.head.sha,
        github.event.client_payload.slash_command.args.named.sha
      )
    uses: ./.github/workflows/test_fork.yaml
    with:
      runs-on: ${{ matrix.os }}
      python-version: ${{ matrix.python-version }}
      python-env: integration
      hatch-run: integration:test
      job-name: integration-fork
    secrets: inherit
