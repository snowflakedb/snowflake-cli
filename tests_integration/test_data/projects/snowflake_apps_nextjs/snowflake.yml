definition_version: "2"

entities:
  test_app:
    type: snowflake-app
    identifier:
      name: TEST_APP
      database: PLACEHOLDER_DB
      schema: PLACEHOLDER_SCHEMA
    artifacts:
      - src: ./*
        dest: ./
        ignore:
          - node_modules
          - .env*
          - __pycache__
          - "*.pyc"
          - .next
          - .git
          - output
          - snowflake.log
    query_warehouse: xsmall
    build_compute_pool:
      name: snowcli_compute_pool
    service_compute_pool:
      name: snowcli_compute_pool
    build_eai: null
    service_eai: null
    artifact_repository:
      name: SNOW_APPS_DEFAULT_ARTIFACT_REPOSITORY
    code_stage:
      name: TEST_APP_CODE
