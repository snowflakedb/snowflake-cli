# Custom Image Validation Configuration

version: "1.0"

# Common checks run for all workloads (ML Jobs + Notebooks).
checks:
  entrypoint: "/usr/local/bin/entrypoint.sh"

  environment_variables:
    - name: DASHBOARD_PORT
      value: "12003"

  python_packages:
    # Core packages
    - ipykernel
    - sqlparse
    - jinja2
    - notebook
    - ipython
    - psutil
    - snowflake-snowpark-python
    - jupyter-server
    # Ray based packages
    - ray
    - lightgbm-ray
    - xgboost-ray
    # Snowflake packages
    - snowflake
    - snowflake.core
    - snowflake-connector-python
    - snowflake-ml-python

  # Run pip check to verify no broken dependencies
  # ignore_patterns: list of package names to ignore in pip check output
  dependency_health:
    enabled: true
    ignore_patterns:
      - jupyter-lsp  # Intentionally uninstalled from official images

# Notebook-specific checks. Always run; failures here only affect Notebook readiness.
# PEP injects "./start_nbctl.sh /shared/nbctl" as container args for vNext notebooks.
notebook_checks:
  required_scripts:
    - start_nbctl.sh
